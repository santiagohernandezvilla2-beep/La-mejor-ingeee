<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>La mejor inge</title>

<style>
    body {
        background: linear-gradient(#ffeef2, #ffd6e0);
        text-align: center;
        font-family: Arial;
    }

    h1 {
        color: #ff4dd0;
        margin-top: 40px;
    }

    button {
        padding: 12px 25px;
        font-size: 18px;
        background-color: #ff4dbe;
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: #ff1ea1;
        transform: scale(1.05);
    }

    #gato {
        display: none;
        margin-top: 30px;
        animation: aparecer 0.6s ease;
    }

    @keyframes aparecer {
        from {opacity: 0; transform: scale(0.8);}
        to {opacity: 1; transform: scale(1);}
    }

    .mensaje {
        font-size: 24px;
        color: #333;
        margin-top: 10px;
    }
</style>
</head>

<body>

<h1>Haz clic 💖</h1>

<button onclick="mostrarGato()">Presióname</button>

<div id="gato">

<!-- 🐱 GATO ILUSTRADO SVG -->
<svg width="200" height="200" viewBox="0 0 200 200">
    <!-- cara -->
    <circle cx="100" cy="100" r="60" fill="#ffccdd"/>

    <!-- orejas -->
    <polygon points="50,60 80,20 90,70" fill="#ffccdd"/>
    <polygon points="150,60 120,20 110,70" fill="#ffccdd"/>

    <!-- ojos -->
    <circle cx="75" cy="100" r="8" fill="#333"/>
    <circle cx="125" cy="100" r="8" fill="#333"/>

    <!-- nariz -->
    <polygon points="100,115 90,130 110,130" fill="#ff4d6d"/>

    <!-- boca -->
    <path d="M90 130 Q100 140 110 130" stroke="#333" fill="none"/>

    <!-- bigotes -->
    <line x1="40" y1="110" x2="80" y2="105" stroke="#333"/>
    <line x1="40" y1="120" x2="80" y2="120" stroke="#333"/>
    <line x1="160" y1="110" x2="120" y2="105" stroke="#333"/>
    <line x1="160" y1="120" x2="120" y2="120" stroke="#333"/>
</svg>

<div class="mensaje">✨ La mejor inge eres tú ✨</div>

</div>

<script>
function mostrarGato() {
    document.getElementById("gato").style.display = "block";
}
</script>

</body>
</html>
